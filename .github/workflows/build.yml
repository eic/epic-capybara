name: "Test capybara installation"

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build and install epic-capybara
        run: |
          pip install hatch
          hatch build
          pip install dist/*.whl

  run-capybara:
    runs-on: ubuntu-latest
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact_1: rec_dis_18x275_minQ2=0_craterlake_18x275.edm4eic.root
            artifact_2: rec_dis_5x41_minQ2=0_craterlake_5x41.edm4eic.root
            name: rec_dis_18x275_vs_5x41_minQ2=0_craterlake
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build and install epic-capybara
        run: |
          pip install hatch
          hatch build
          pip install dist/*.whl
      - name: Download EICrecon artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FILE1=$(capybara capy rev HEAD --artifact-name "${{ matrix.artifact_1 }}")
          FILE2=$(capybara capy rev HEAD --artifact-name "${{ matrix.artifact_2 }}")
          echo "FILE1=$FILE1" >> $GITHUB_ENV
          echo "FILE2=$FILE2" >> $GITHUB_ENV
      - name: Run capybara bara
        run: |
          capybara bara "$FILE1" "$FILE2"
          mv capybara-reports "${{ matrix.name }}"
          touch ".${{ matrix.name }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}.capy
          path: |
            .${{ matrix.name }}
            ${{ matrix.name }}/
          if-no-files-found: error

  merge-capybara:
    name: Merge capybara reports
    runs-on: ubuntu-latest
    needs: [run-capybara]
    steps:
    - uses: actions/upload-artifact/merge@v4
      with:
        name: capybara-report
        pattern: "*.capy"
        delete-merged: true

  list-open-prs:
    uses: eic/actions/.github/workflows/list-open-prs.yml@main

  get-docs-from-open-prs:
    runs-on: ubuntu-latest
    needs:
    - list-open-prs
    - merge-capybara
    if: always() && !cancelled()
    strategy:
      matrix: ${{ fromJSON(needs.list-open-prs.outputs.json) }}
      fail-fast: false
      max-parallel: 4
    steps:
    - name: Download capybara artifact (other PRs)
      id: download_capybara
      uses: dawidd6/action-download-artifact@v21
      if: github.event.pull_request.number != matrix.pr
      with:
        commit: ${{ matrix.head_sha }}
        path: publishing_docs/pr/${{ matrix.pr }}/capybara/
        name: capybara-report
        workflow: ".github/workflows/build.yml"
        workflow_conclusion: "completed"
        if_no_artifact_found: ignore
    - name: Download capybara artifact (this PR)
      uses: actions/download-artifact@v4
      if: github.event.pull_request.number == matrix.pr
      with:
        name: capybara-report
        path: publishing_docs/pr/${{ matrix.pr }}/capybara/
    - uses: actions/upload-artifact@v4
      with:
        name: github-pages-staging-pr-${{ matrix.pr }}
        path: publishing_docs/
        if-no-files-found: ignore

  get-docs-from-main:
    runs-on: ubuntu-latest
    needs:
    - merge-capybara
    if: always() && !cancelled()
    steps:
    - name: Download capybara artifact (in PR)
      id: download_capybara
      uses: dawidd6/action-download-artifact@v21
      if: github.ref_name != 'main'
      with:
        branch: main
        path: publishing_docs/capybara/
        name: capybara-report
        workflow: ".github/workflows/build.yml"
        workflow_conclusion: "completed"
        if_no_artifact_found: ignore
    - name: Download capybara artifact (on main)
      uses: actions/download-artifact@v4
      if: github.ref_name == 'main'
      with:
        name: capybara-report
        path: publishing_docs/capybara/
    - name: Populate capybara summary (on main)
      if: github.ref_name == 'main' || steps.download_capybara.outputs.found_artifact == 'true'
      run: |
        echo "### Capybara summary for main" >> publishing_docs/capybara/index.md
        while IFS= read -r dir; do
          name=$(basename "$dir")
          echo "- [${name}](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/capybara/${name}/index.html)"
        done < <(find publishing_docs/capybara/ -mindepth 1 -maxdepth 1 -type d | sort) \
          >> publishing_docs/capybara/index.md
    - name: Create capybara step summary (on main)
      if: github.ref_name == 'main'
      run: cat publishing_docs/capybara/index.md >> $GITHUB_STEP_SUMMARY
    - name: Ensure publishing_docs is non-empty
      run: mkdir -p publishing_docs && touch publishing_docs/.keep
    - uses: actions/upload-artifact@v4
      with:
        name: github-pages-staging-main
        path: publishing_docs/
        if-no-files-found: error
        include-hidden-files: true

  build-artifacts-page:
    runs-on: ubuntu-latest
    needs:
    - get-docs-from-open-prs
    - get-docs-from-main
    if: always() && !cancelled() && !failure()
    steps:
    - name: Download artifacts for pages
      uses: actions/download-artifact@v4
      with:
        path: artifacts/
    - name: Assemble site
      run: |
        mkdir -p publishing_docs
        for dir in artifacts/github-pages-staging-*/; do
          [ -d "$dir" ] && cp -r "$dir"/. publishing_docs/ || true
        done
    - name: Make PR summary page
      run: |
        mkdir -p publishing_docs/pr
        echo "### PRs" >> publishing_docs/pr/index.md
        find publishing_docs/pr -mindepth 1 -maxdepth 1 -type d \
          -printf "- [%f](%f/index.md)\n" | sort >> publishing_docs/pr/index.md
    - name: List content to publish
      run: find publishing_docs/
    - uses: actions/upload-pages-artifact@v3
      with:
        path: publishing_docs/
        retention-days: 7
    - name: Populate capybara summary
      if: ${{ github.event_name == 'pull_request' }}
      run: |
        echo "### Capybara summary for PR ${{ github.event.pull_request.number }}" \
          >> capybara_${{ github.event.pull_request.number }}.md
        CAPY_DIR="publishing_docs/pr/${{ github.event.pull_request.number }}/capybara"
        if [ -d "$CAPY_DIR" ]; then
          while IFS= read -r dir; do
            name=$(basename "$dir")
            echo "- [${name}](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/pr/${{ github.event.pull_request.number }}/capybara/${name}/index.html)"
          done < <(find "$CAPY_DIR" -mindepth 1 -maxdepth 1 -type d | sort) \
            >> capybara_${{ github.event.pull_request.number }}.md
        fi
        echo "<sup><sub>Last updated $(TZ=America/New_York date -Iminutes) ${{ github.event.pull_request.head.sha }}</sub></sup>" \
          >> capybara_${{ github.event.pull_request.number }}.md
    - name: Create capybara step summary
      if: ${{ github.event_name == 'pull_request' }}
      run: cat capybara_${{ github.event.pull_request.number }}.md >> $GITHUB_STEP_SUMMARY
    - name: Upload capybara summary
      if: ${{ github.event_name == 'pull_request' }}
      uses: actions/upload-artifact@v4
      with:
        name: capybara_${{ github.event.pull_request.number }}.md
        path: capybara_${{ github.event.pull_request.number }}.md

  deploy-artifacts-page:
    needs:
    - build-artifacts-page
    if: always() && !cancelled() && !failure()
    concurrency:
      group: pages
      cancel-in-progress: false
    permissions:
      pages: write
      id-token: write
      pull-requests: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      continue-on-error: true
      uses: actions/deploy-pages@v4
    - name: Find capybara comment
      if: ${{ github.event_name == 'pull_request' }}
      id: find_comment
      uses: peter-evans/find-comment@v3
      with:
        issue-number: ${{ github.event.pull_request.number }}
        comment-author: 'github-actions[bot]'
        body-includes: Capybara summary
    - name: Fetch capybara summary
      if: ${{ github.event_name == 'pull_request' }}
      uses: actions/download-artifact@v4
      with:
        name: capybara_${{ github.event.pull_request.number }}.md
    - name: Create or update capybara comment
      if: ${{ github.event_name == 'pull_request' }}
      uses: peter-evans/create-or-update-comment@v4
      with:
        comment-id: ${{ steps.find_comment.outputs.comment-id }}
        issue-number: ${{ github.event.pull_request.number }}
        body-file: capybara_${{ github.event.pull_request.number }}.md
        edit-mode: replace
